<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Квесты по информатике</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: linear-gradient(145deg, #0b1a2e 0%, #1b2f44 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .quest-container {
            max-width: 800px;
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 30px 28px 40px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.06);
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #eef5ff;
            text-shadow: 0 4px 12px rgba(0, 20, 40, 0.6);
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 12px;
            border-bottom: 2px solid rgba(100, 180, 255, 0.25);
            padding-bottom: 18px;
        }

        h1 small {
            font-size: 1rem;
            font-weight: 400;
            color: #8bb9fe;
            margin-left: auto;
            background: rgba(0, 80, 160, 0.3);
            padding: 5px 18px;
            border-radius: 40px;
            letter-spacing: 0.3px;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .quest-progress {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #b6d4f0;
            font-weight: 500;
            font-size: 1rem;
            background: rgba(0, 20, 40, 0.4);
            padding: 12px 20px;
            border-radius: 60px;
            margin-bottom: 30px;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .progress-indicator {
            background: #2b4b70;
            height: 8px;
            flex: 1;
            border-radius: 12px;
            margin: 0 16px;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #6db3ff, #3b8cff);
            border-radius: 12px;
            transition: width 0.25s ease;
            box-shadow: 0 0 12px #3b8cff88;
        }

        .quest-card {
            background: rgba(18, 34, 54, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 30px 28px;
            margin-bottom: 28px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 12px 30px -8px rgba(0, 0, 0, 0.5);
            transition: 0.2s;
        }

        .quest-header {
            display: flex;
            align-items: baseline;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .quest-number {
            background: #2d5277;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1rem;
            color: #d5e9ff;
            letter-spacing: 0.3px;
            border: 1px solid #3f6a94;
        }

        .quest-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: #e2efff;
            word-break: break-word;
            line-height: 1.3;
            text-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }

        .quest-description {
            color: #c7ddf5;
            font-size: 1.2rem;
            line-height: 1.5;
            margin: 18px 0 22px;
            padding-left: 4px;
            opacity: 0.9;
        }

        .quest-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 22px 0 18px;
        }

        .option-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 60px;
            padding: 14px 22px;
            color: #d6eaff;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 14px;
            backdrop-filter: blur(2px);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        .option-item:hover {
            background: rgba(70, 140, 220, 0.2);
            border-color: #4f8ed8;
            transform: scale(1.01);
            box-shadow: 0 8px 16px rgba(0, 30, 70, 0.5);
        }

        .option-item.selected {
            background: rgba(50, 140, 255, 0.25);
            border-color: #6db3ff;
            box-shadow: 0 0 0 2px #3b8cff66, 0 6px 14px rgba(0, 80, 200, 0.3);
        }

        .option-item.correct {
            background: rgba(60, 220, 120, 0.2);
            border-color: #5ddf8b;
            box-shadow: 0 0 0 2px #5ddf8b55;
        }

        .option-item.wrong {
            background: rgba(220, 70, 70, 0.2);
            border-color: #ff6b6b;
            box-shadow: 0 0 0 2px #ff6b6b55;
        }

        .option-prefix {
            font-weight: 700;
            color: #8bb9fe;
            background: rgba(0, 40, 80, 0.4);
            border-radius: 40px;
            padding: 0 14px;
            font-size: 0.9rem;
            line-height: 2;
            min-width: 34px;
            text-align: center;
        }

        .feedback-area {
            margin-top: 18px;
            padding: 16px 20px;
            border-radius: 40px;
            font-weight: 500;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(2px);
            border-left: 4px solid #3b8cff;
            color: #c4ddff;
            transition: 0.2s;
            min-height: 68px;
            display: flex;
            align-items: center;
        }

        .feedback-area.success {
            border-left-color: #5ddf8b;
            color: #b5f0cd;
            background: rgba(40, 160, 80, 0.15);
        }

        .feedback-area.error {
            border-left-color: #ff6b6b;
            color: #ffc1c1;
            background: rgba(200, 50, 50, 0.12);
        }

        .navigation {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .nav-btn {
            background: rgba(30, 60, 100, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #d6eaff;
            padding: 14px 32px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.15s;
            backdrop-filter: blur(4px);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            flex: 1 1 auto;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .nav-btn:hover:not(:disabled) {
            background: rgba(60, 130, 220, 0.4);
            border-color: #5a9cff;
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(0, 60, 150, 0.3);
        }

        .nav-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
            filter: grayscale(0.3);
        }

        .nav-btn.primary {
            background: #2a6bb0;
            border-color: #4f8ed8;
            color: white;
            box-shadow: 0 6px 14px rgba(0, 80, 200, 0.3);
        }

        .nav-btn.primary:hover:not(:disabled) {
            background: #3a7fd4;
            border-color: #7ab0ff;
        }

        .reset-btn {
            background: rgba(180, 60, 60, 0.25);
            border-color: rgba(255, 100, 100, 0.2);
            color: #ffbaba;
            flex: 0.5;
        }

        .reset-btn:hover:not(:disabled) {
            background: rgba(200, 70, 70, 0.35);
            border-color: #ff7a7a;
        }

        .footer-meta {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            color: #5f84aa;
            font-size: 0.9rem;
            letter-spacing: 0.4px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            padding-top: 24px;
        }

        @media (max-width: 550px) {
            .quest-container { padding: 20px 16px; }
            h1 { font-size: 2rem; flex-wrap: wrap; }
            .quest-title { font-size: 1.5rem; }
            .quest-description { font-size: 1rem; }
            .option-item { padding: 12px 16px; }
            .nav-btn { padding: 12px 20px; }
        }
    </style>
</head>
<body>
    <div class="quest-container" id="app">
        <h1>
            🧩 Квесты
            <small>Информатика</small>
        </h1>

        <!-- Progress -->
        <div class="quest-progress">
            <span id="questCounter">1 / 5</span>
            <div class="progress-indicator">
                <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
            </div>
            <span id="scoreDisplay">⭐ 0</span>
        </div>

        <!-- Карточка квеста -->
        <div class="quest-card">
            <div class="quest-header">
                <span class="quest-number" id="questNumber">#1</span>
                <span class="quest-title" id="questTitle">Загрузка...</span>
            </div>
            <div class="quest-description" id="questDescription">Текст задания</div>

            <div class="quest-options" id="optionsContainer">
                <!-- опции генерируются через JS -->
            </div>

            <div class="feedback-area" id="feedback">
                💡 Выберите вариант ответа
            </div>
        </div>

        <!-- Навигация -->
        <div class="navigation">
            <button class="nav-btn" id="prevBtn" disabled>◀ Назад</button>
            <button class="nav-btn primary" id="nextBtn">Вперёд ▶</button>
            <button class="nav-btn reset-btn" id="resetBtn">⟲ Сброс</button>
        </div>
        <div class="footer-meta">
            ⚡ 5 квестов по основам информатики
        </div>
    </div>

    <script>
        (function() {
            // ---------- ДАННЫЕ КВЕСТОВ ----------
            const quests = [
                {
                    id: 1,
                    title: 'Бит и байт',
                    description: 'Сколько бит содержится в одном байте?',
                    options: ['4 бита', '8 бит', '16 бит', '32 бита'],
                    correct: 1 // индекс (0-based)
                },
                {
                    id: 2,
                    title: 'Системы счисления',
                    description: 'Какое число является двоичным представлением десятичного числа 10?',
                    options: ['1001', '1010', '1100', '1110'],
                    correct: 1
                },
                {
                    id: 3,
                    title: 'Логические операции',
                    description: 'Чему равен результат операции "Истина И Ложь"?',
                    options: ['Истина', 'Ложь', 'Не определено', 'Зависит от контекста'],
                    correct: 1
                },
                {
                    id: 4,
                    title: 'Алгоритмы',
                    description: 'Как называется свойство алгоритма, означающее, что он должен приводить к результату за конечное число шагов?',
                    options: ['Дискретность', 'Понятность', 'Результативность', 'Массовость'],
                    correct: 2
                },
                {
                    id: 5,
                    title: 'Кодирование',
                    description: 'Сколько различных символов можно закодировать с помощью 7-битного кода?',
                    options: ['64', '128', '256', '512'],
                    correct: 1
                }
            ];

            // ---------- СОСТОЯНИЕ ----------
            let currentIndex = 0;              // 0-based
            let selectedAnswers = new Array(quests.length).fill(null); // индекс выбранного ответа или null
            let answerStatus = new Array(quests.length).fill(null);    // 'correct' | 'wrong' | null

            // DOM-ссылки
            const questNumberEl = document.getElementById('questNumber');
            const questTitleEl = document.getElementById('questTitle');
            const questDescriptionEl = document.getElementById('questDescription');
            const optionsContainer = document.getElementById('optionsContainer');
            const feedbackEl = document.getElementById('feedback');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const resetBtn = document.getElementById('resetBtn');
            const questCounter = document.getElementById('questCounter');
            const progressFill = document.getElementById('progressFill');
            const scoreDisplay = document.getElementById('scoreDisplay');

            // Вспомогательные функции
            function getCurrentQuest() {
                return quests[currentIndex];
            }

            // Подсчёт очков (количество правильных ответов)
            function calculateScore() {
                let score = 0;
                for (let i = 0; i < quests.length; i++) {
                    if (answerStatus[i] === 'correct') score++;
                }
                return score;
            }

            // Обновить счёт и прогресс
            function updateMeta() {
                const total = quests.length;
                const current = currentIndex + 1;
                questCounter.textContent = `${current} / ${total}`;
                const progress = ((currentIndex + 1) / total) * 100;
                progressFill.style.width = `${progress}%`;

                const score = calculateScore();
                scoreDisplay.textContent = `⭐ ${score}`;
            }

            // Рендеринг текущего квеста
            function renderQuest() {
                const quest = getCurrentQuest();
                questNumberEl.textContent = `#${quest.id}`;
                questTitleEl.textContent = quest.title;
                questDescriptionEl.textContent = quest.description;

                // Генерируем варианты
                const selectedIdx = selectedAnswers[currentIndex];
                const status = answerStatus[currentIndex]; // 'correct' | 'wrong' | null

                let html = '';
                const prefixes = ['A', 'B', 'C', 'D'];
                quest.options.forEach((optionText, idx) => {
                    let classes = 'option-item';
                    if (selectedIdx === idx) {
                        classes += ' selected';
                        if (status === 'correct') classes += ' correct';
                        else if (status === 'wrong') classes += ' wrong';
                    }
                    // дополнительно: если статус правильный, но выбран не этот – не подсвечиваем
                    // но мы можем показать правильный вариант? по условию не требуется, оставляем как есть.
                    html += `
                        <div class="${classes}" data-optindex="${idx}">
                            <span class="option-prefix">${prefixes[idx]}</span>
                            ${optionText}
                        </div>
                    `;
                });
                optionsContainer.innerHTML = html;

                // Обновить фидбек
                if (status === 'correct') {
                    feedbackEl.className = 'feedback-area success';
                    feedbackEl.textContent = '✅ Верно! Отлично!';
                } else if (status === 'wrong') {
                    feedbackEl.className = 'feedback-area error';
                    feedbackEl.textContent = `❌ Неверно. Правильный ответ: ${quest.options[quest.correct]}`;
                } else {
                    feedbackEl.className = 'feedback-area';
                    feedbackEl.textContent = selectedIdx !== null ? '🤔 Выберите вариант' : '💡 Выберите вариант ответа';
                }

                // Навесить обработчики на option
                document.querySelectorAll('.option-item').forEach(el => {
                    el.addEventListener('click', onOptionClick);
                });

                // Обновить кнопки навигации
                prevBtn.disabled = (currentIndex === 0);
                // Кнопка "Вперёд" активна всегда, но можно сделать доп. проверку
                // Сброс всегда активен

                updateMeta();
            }

            // Обработчик клика по варианту
            function onOptionClick(e) {
                const target = e.currentTarget;
                const optIndex = parseInt(target.dataset.optindex, 10);
                if (isNaN(optIndex)) return;

                const quest = getCurrentQuest();
                // Если уже отвечено на этот вопрос – можно перевыбрать? Да, разрешим.
                // Проверим, не отвечен ли уже (чтобы не менять после правильного? Можно разрешить менять всегда)
                // Но лучше разрешить, чтобы можно было исправить.
                // При этом сбрасываем старый статус.
                selectedAnswers[currentIndex] = optIndex;
                const isCorrect = (optIndex === quest.correct);
                answerStatus[currentIndex] = isCorrect ? 'correct' : 'wrong';

                // перерисовать текущий квест
                renderQuest();
                // также обновляем счёт, прогресс (мета)
                updateMeta();
            }

            // Переключение на другой квест
            function goToIndex(newIndex) {
                if (newIndex < 0 || newIndex >= quests.length) return;
                currentIndex = newIndex;
                renderQuest();
                // после рендера обновить кнопки
                prevBtn.disabled = (currentIndex === 0);
                // Если это последний квест, меняем текст кнопки "Вперёд"
                if (currentIndex === quests.length - 1) {
                    nextBtn.textContent = '🏁 Финиш';
                } else {
                    nextBtn.textContent = 'Вперёд ▶';
                }
                updateMeta();
            }

            // Сброс прогресса
            function resetAll() {
                // Сбросить выбранные ответы и статусы
                for (let i = 0; i < quests.length; i++) {
                    selectedAnswers[i] = null;
                    answerStatus[i] = null;
                }
                currentIndex = 0;
                renderQuest();
                // обновить мета
                updateMeta();
                // кнопка "Вперёд" в дефолт
                nextBtn.textContent = 'Вперёд ▶';
                prevBtn.disabled = true;
                // дополнительно сбросить фидбек
                feedbackEl.className = 'feedback-area';
                feedbackEl.textContent = '💡 Выберите вариант ответа';
                // Убрать подсветку выбора
                document.querySelectorAll('.option-item').forEach(el => {
                    el.classList.remove('selected', 'correct', 'wrong');
                });
                // Сброс счётчика
                scoreDisplay.textContent = '⭐ 0';
                progressFill.style.width = '0%';
                questCounter.textContent = `1 / ${quests.length}`;
            }

            // Обработчики навигации
            function onPrev() {
                if (currentIndex > 0) {
                    goToIndex(currentIndex - 1);
                }
            }

            function onNext() {
                if (currentIndex < quests.length - 1) {
                    goToIndex(currentIndex + 1);
                } else {
                    // Финиш – просто показать сообщение или ничего
                    // Можно подсветить, что все квесты пройдены
                    if (currentIndex === quests.length - 1) {
                        const allAnswered = selectedAnswers.every(idx => idx !== null);
                        if (allAnswered) {
                            const score = calculateScore();
                            feedbackEl.className = 'feedback-area success';
                            feedbackEl.textContent = `🎉 Поздравляем! Вы завершили все квесты! Результат: ${score}/${quests.length}`;
                        } else {
                            feedbackEl.className = 'feedback-area';
                            feedbackEl.textContent = '📌 Остались неотвеченные квесты. Пройдите их!';
                        }
                    }
                }
            }

            // Инициализация
            function init() {
                // Навесить события
                prevBtn.addEventListener('click', onPrev);
                nextBtn.addEventListener('click', onNext);
                resetBtn.addEventListener('click', resetAll);

                // Установить начальный индекс
                currentIndex = 0;
                // Сбросить данные
                resetAll(); // вызывает renderQuest и обновление
                // Дополнительно сбросить фидбек
                feedbackEl.className = 'feedback-area';
                feedbackEl.textContent = '💡 Выберите вариант ответа';
                // кнопка prev выкл
                prevBtn.disabled = true;
                // nextBtn текст
                nextBtn.textContent = 'Вперёд ▶';
                // прогресс
                updateMeta();
            }

            init();
        })();
    </script>
</body>
</html>
